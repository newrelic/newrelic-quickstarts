description: |
  ## DEMO Redis observability with OpenTelemetry
  This is a DEMO quickstart cloned for the AFA2026 hackathon (EPIC NR-576657).
  The OpenTelemetry Redis receiver collects metrics from your running Redis instances. These metrics provide insights into operations, memory usage, client connections, replication lag, and keyspace efficiency.

  A New Relic entity is created for each Redis instance, allowing you to easily explore, configure alerts, and compare metrics for all your Redis databases in one place. The included dashboard adapts to clustered Redis deployments by faceting on `redis.cluster.name` when present.

  ### Why monitor Redis with New Relic + OpenTelemetry?
  - Vendor-neutral collection via OTel Redis receiver
  - Comprehensive visibility: throughput, latency, memory pressure, connection saturation, replication lag, keyspace hit/miss
  - Pre-built dashboard with 5 panels and cluster-aware NRQL
  - 4 production-ready alert conditions covering memory, connections, replication, and cache efficiency

