summary: |
  Monitor HAProxy load balancers with OpenTelemetry. Get pre-built dashboards for sessions, requests, connections, errors, and backend server health using the OTel haproxyreceiver.
description: |
  ## How to monitor HAProxy with OpenTelemetry and New Relic

  The OpenTelemetry haproxyreceiver collects metrics from your HAProxy instances via the stats endpoint. These metrics provide insights into sessions, requests, connections, errors, backend server health, and network throughput.

  A New Relic entity will be created for each HAProxy instance, allowing you to easily explore, configure alerts, and compare metrics for all your HAProxy servers in one place.

  ### Why monitor HAProxy with New Relic?

  New Relic's HAProxy OpenTelemetry quickstart gives you comprehensive visibility into your HAProxy load balancers alongside your apps and server infrastructure. Monitor frontend request rates, backend server health, connection errors, and network I/O in real-time to ensure optimal load balancing performance.

  ### What's included

  - Pre-built dashboard with traffic overview, network I/O, error tracking, and backend health
  - Entity synthesis for automatic HAProxy entity creation
  - Infrastructure topology with Host and Kubernetes Pod relationships
