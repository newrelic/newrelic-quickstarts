  <path d="M160 168 L256 112 L352 168" fill="none" stroke="#34D399" stroke-width="10" stroke-linecap="round"/>

  <!-- Left eye outer glow -->
  <circle cx="192" cy="224" r="48" fill="#34D399"/>
