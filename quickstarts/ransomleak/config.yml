# Sets the URL name of the quickstart on public I/O (required)
slug: ransomleak

# Displayed in the UI (required)
title: RansomLeak Security Awareness Training

# Long-form description of the quickstart (required)
description: |
  RansomLeak is a security awareness training platform. It turns New Relic signals into
  training: push human-risk telemetry into New Relic (training completion, phishing and
  smishing outcomes, and a per-team human-risk score), then trigger a 5 to 10 minute
  interactive training module for the named user when a Workflow fires, with completion
  written back to the originating signal.

  This quickstart bundles a two-page Human Risk dashboard plus alerts for overdue training,
  high team risk scores, and phishing click-rate spikes. It pairs with the RansomLeak
  Event and Metric integration; see the setup documentation to start sending data.

# Displayed in search results and recommendations. Summarizes a quickstarts functionality.
summary: |
  See human risk next to your system telemetry and auto-assign security training when a New Relic signal fires.

# Support level: New Relic | Verified | Community (required)
level: Community

# Authors of the quickstart (required)
authors:
  - RansomLeak

# Keywords for filtering / searching criteria in the UI
keywords:
  - security
  - security awareness training
  - human risk
  - human risk management
  - phishing
  - smishing
  - compliance
  - training

# Reference to alert policies to be included in this quickstart
alertPolicies:
  - ransomleak-human-risk

# Reference to dashboards to be included in this quickstart
dashboards:
  - ransomleak-human-risk

# Core data sources this quickstart relies on — RansomLeak lands its human-risk
# telemetry in the customer's account via the New Relic Event API + Metric API.
dataSourceIds:
  - event-api
  - metric-api

# Documentation references
documentation:
  - name: RansomLeak New Relic integration setup
    url: https://ransomleak.com/integrations/
    description: How to send human-risk events to New Relic and wire a Workflow to auto-assign training.

# Content / Design
icon: logo.svg
