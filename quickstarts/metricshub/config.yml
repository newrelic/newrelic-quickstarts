title: MetricsHub

description: |
  ## About MetricsHub
    MetricsHub is an OpenTelemetry-native metrics collector. Use it to monitor the hardware health of almost any server, storage system, or network switch on the market, as well as the performance and status of your operating systems and databases — then send the metrics to New Relic.
    MetricsHub is available as a free and open-source Community Edition. An Enterprise Edition with extended monitoring coverage (200+ connectors) and 24x7 support is also available. See the [pricing page](https://metricshub.com/pricing) for details.

  ### About this integration
    This integration connects the MetricsHub agent's native OpenTelemetry pipeline to your New Relic account over OTLP. MetricsHub collects metrics from your infrastructure using standard protocols — SNMP, SSH, HTTP, IPMI, JMX, WBEM, WinRM, WMI, and SQL/JDBC — so you don't need to deploy an agent on the monitored systems.

  ### Monitoring the health of your on-prem IT infrastructure in New Relic
    The monitoring available with this integration gives you full visualization into your on-prem IT infrastructure.
    - Monitor the hardware health of your servers, storage systems, and network switches: processors, memory modules, disks, network cards, controllers, power supplies, batteries, and physical sensors.
    - Monitor system performance at the operating-system level: CPU utilization, memory usage, network error rates, and more — across Windows, Linux, HP-UX, and IBM AIX hosts.
    - Monitor enterprise storage systems: capacity, throughput, and component health.
    - Monitor databases, including Oracle Database, Microsoft SQL Server, PostgreSQL, MySQL, MariaDB, IBM Informix, and Cassandra.
    - Evaluate the energy efficiency of your various data centers daily, monthly, or yearly based on collected power consumption metrics (no smart PDUs needed).
    - Identify the optimal temperature for your data centers through real metrics and data-driven suggestions. Estimate potential savings by considering a slight increase in temperature.

