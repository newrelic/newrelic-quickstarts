title: IBM MQ (OpenTelemetry Collector)
description: |
  ## IBM MQ performance via OpenTelemetry

  IBM MQ allows independent and potentially non-concurrent applications on a distributed system to securely communicate with each other, using messages.

  This quickstart instruments IBM MQ via the OpenTelemetry collector (NRDot), scraping the IBM MQ Prometheus exporter (`mq-metric-samples`) and forwarding metrics to New Relic over OTLP. It provides side-by-side parity with the native `nri-ibmmq` integration plus additional channel and queue-handle telemetry that OTel uniquely exposes.

  ### IBM MQ OTel quickstart highlights

  The IBM MQ OTel quickstart comes with a pre-built dashboard visualizing:
  - Queue Manager connections, error rate, and message throughput
  - Per-queue depth, depth %, and message age
  - GET / PUT throughput rates (per minute)
  - Queue time (short and long window)
  - Expired and rolled-back messages
  - Filesystem usage (queue manager and log)
  - Channel status, type, and throughput (messages and bytes per minute)
  - Live queue handle activity (input, output, publish, browse)
  - Queue Manager uptime and active services
summary: |
  Monitor IBM MQ via the OpenTelemetry collector with parity to the native infrastructure integration plus added channel telemetry.
