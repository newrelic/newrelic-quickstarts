# Alert: PCG Ingest Channel Depth Critical
# Detects when ingest queue is approaching capacity
name: PCG Ingest Channel Depth Critical

# Description and details
description: |
  PCG ingest channel depth has exceeded 40,000 records (80% of 50,000 capacity).

  The ingest channel queues records before Arrow/Parquet conversion. When this
  queue fills:
  - Backpressure engages at 80% (40,000)
  - If it continues to rise, downstream issues are not resolving

  Check:
  - S3 write performance
  - Arrow conversion latency
  - S3Write channel depth

  Rising queue depth is an early warning of downstream problems.

# Type of alert: BASELINE | STATIC
type: STATIC

# NRQL query
nrql:
  query: "SELECT latest(otelcol_icebergexporter_ingest_channel_depth) FROM Metric WHERE namespace = 'pcg-backpressure-processor' FACET pod_name"

# Function used to aggregate the NRQL query value(s) for comparison to the terms.threshold (Default: SINGLE_VALUE)
valueFunction: SINGLE_VALUE

# List of Critical and Warning thresholds for the condition
terms:
  - priority: WARNING
    # Operator used to compare against the threshold.
    operator: ABOVE
    # Value that triggers a violation (80% of 50,000 capacity)
    threshold: 40000
    # Time in seconds; 120 - 3600 (2 minutes)
    thresholdDuration: 120
    # How many data points must be in violation for the duration
    thresholdOccurrences: ALL

# Duration after which a violation automatically closes
# Time in seconds; 300 - 2592000 (Default: 86400 [1 day])
violationTimeLimitSeconds: 259200
