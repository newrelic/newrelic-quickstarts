# Alert: PCG Backpressure Active Sustained
# Detects when backpressure is engaged for an extended period
name: PCG Backpressure Active Sustained

# Description and details
description: |
  PCG backpressure has been active for over 5 minutes. When backpressure is engaged,
  the gateway returns 503 errors to upstream agents, which must retry their requests.

  Sustained backpressure indicates:
  - System cannot handle current load
  - Possible downstream issues (S3, memory)
  - May need to scale out

  While not data loss (agents retry), sustained backpressure increases end-to-end
  latency and system stress.

# Type of alert: BASELINE | STATIC
type: STATIC

# NRQL query
nrql:
  query: "SELECT latest(pcg_backpressure_active) FROM Metric WHERE namespace = 'pcg-backpressure-processor' FACET pod_name"

# Function used to aggregate the NRQL query value(s) for comparison to the terms.threshold (Default: SINGLE_VALUE)
valueFunction: SINGLE_VALUE

# List of Critical and Warning thresholds for the condition
terms:
  - priority: WARNING
    # Operator used to compare against the threshold.
    operator: ABOVE
    # Value that triggers a violation (1 = backpressure active)
    threshold: 0
    # Time in seconds; 120 - 3600 (5 minutes)
    thresholdDuration: 300
    # How many data points must be in violation for the duration
    thresholdOccurrences: ALL

# Duration after which a violation automatically closes
# Time in seconds; 300 - 2592000 (Default: 86400 [1 day])
violationTimeLimitSeconds: 259200
