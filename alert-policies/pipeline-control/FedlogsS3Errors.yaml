# Alert: PCG S3 Errors
# Detects S3 upload failures - zero tolerance at steady state
name: PCG S3 Errors

# Description and details
description: |
  PCG S3 write errors detected. Parquet files are failing to upload to S3.

  This is a ZERO-TOLERANCE condition at steady state. S3 errors mean:
  - Files are not being persisted
  - Queues will fill up
  - Eventually leads to data loss

  Common S3 error causes:
  - 403 Forbidden: IAM/bucket policy issue
  - 500/503: S3 service degradation
  - Timeout: Network issues
  - NoSuchBucket: Configuration error

  IMMEDIATE ACTION REQUIRED:
  1. Check AWS S3 service health
  2. Verify IAM role permissions
  3. Check network connectivity
  4. Review S3 bucket policy
  5. Monitor s3write_channel_depth for queue buildup

# Type of alert: BASELINE | STATIC
type: STATIC

# NRQL query
nrql:
  query: "SELECT rate(sum(otelcol_icebergexporter_s3_errors), 1 minute) FROM Metric WHERE namespace = 'pcg-backpressure-processor'"

# Function used to aggregate the NRQL query value(s) for comparison to the terms.threshold (Default: SINGLE_VALUE)
valueFunction: SINGLE_VALUE

# List of Critical and Warning thresholds for the condition
terms:
  - priority: WARNING
    # Operator used to compare against the threshold.
    operator: ABOVE
    # Value that triggers a violation - ANY S3 errors need attention
    threshold: 0
    # Time in seconds; 120 - 3600
    thresholdDuration: 60
    # How many data points must be in violation for the duration
    thresholdOccurrences: AT_LEAST_ONCE

# Duration after which a violation automatically closes
# Time in seconds; 300 - 2592000 (Default: 86400 [1 day])
violationTimeLimitSeconds: 259200
