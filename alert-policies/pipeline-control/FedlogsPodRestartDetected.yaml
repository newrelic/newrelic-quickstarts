# Alert: PCG Pod Restart Detected
# Detects OOM kills, crashes, or other pod failures
name: PCG Pod Restart Detected

# Description and details
description: |
  A PCG pod has restarted. Pod restarts indicate instability and require
  investigation.

  Common causes:
  - OOM Kill (memory exceeded container limit)
  - Application crash/panic
  - Liveness probe failure
  - Manual restart

  Investigation steps:
  1. Check pod events: kubectl describe pod <pod-name>
  2. Check previous logs: kubectl logs <pod-name> --previous
  3. Look for OOMKilled in termination reason
  4. Review memory utilization trend before restart

  If OOM Kill:
  - Review GOMEMLIMIT setting (3276 MiB)
  - Check for memory leaks
  - Consider increasing memory limit

# Type of alert: BASELINE | STATIC
type: STATIC

# NRQL query
nrql:
  query: "SELECT latest(restartCount) FROM K8sContainerSample WHERE clusterName = 'pcg-federated-logs-staging' AND namespaceName = 'pcg-backpressure-processor' AND containerName = 'pcg' FACET podName"

# Function used to aggregate the NRQL query value(s) for comparison to the terms.threshold (Default: SINGLE_VALUE)
valueFunction: SINGLE_VALUE

# List of Critical and Warning thresholds for the condition
terms:
  - priority: WARNING
    # Operator used to compare against the threshold.
    operator: ABOVE
    # Value that triggers a violation - any restart is concerning
    threshold: 0
    # Time in seconds; 120 - 3600
    thresholdDuration: 60
    # How many data points must be in violation for the duration
    thresholdOccurrences: AT_LEAST_ONCE

# Duration after which a violation automatically closes
# Time in seconds; 300 - 2592000 (Default: 86400 [1 day])
violationTimeLimitSeconds: 259200
