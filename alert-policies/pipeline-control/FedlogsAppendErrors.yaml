# Alert: PCG Append Errors
# Detects Arrow/Parquet conversion failures - records that fail are LOST
name: PCG Append Errors

# Description and details
description: |
  PCG Iceberg exporter append errors detected. Records that fail Arrow/Parquet
  conversion cannot be processed and are permanently lost. This is a zero-tolerance
  condition that requires immediate investigation.

  Common causes:
  - Malformed timestamp fields
  - Required fields set to null
  - Type mismatches (string vs int)
  - Oversized field values

# Type of alert: BASELINE | STATIC
type: STATIC

# NRQL query
nrql:
  query: "SELECT rate(sum(otelcol_icebergexporter_append_errors), 1 minute) FROM Metric WHERE namespace = 'pcg-backpressure-processor'"

# Function used to aggregate the NRQL query value(s) for comparison to the terms.threshold (Default: SINGLE_VALUE)
valueFunction: SINGLE_VALUE

# List of Critical and Warning thresholds for the condition
terms:
  - priority: WARNING
    # Operator used to compare against the threshold.
    operator: ABOVE
    # Value that triggers a violation
    threshold: 0
    # Time in seconds; 120 - 3600
    thresholdDuration: 60
    # How many data points must be in violation for the duration
    thresholdOccurrences: AT_LEAST_ONCE

# Duration after which a violation automatically closes
# Time in seconds; 300 - 2592000 (Default: 86400 [1 day])
violationTimeLimitSeconds: 259200
