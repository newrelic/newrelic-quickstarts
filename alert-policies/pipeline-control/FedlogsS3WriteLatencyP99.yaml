# Alert: PCG S3 Write Latency P99
# Detects when S3 uploads are taking too long
name: PCG S3 Write Latency P99

# Description and details
description: |
  PCG S3 write latency P99 has exceeded 5000ms (5 seconds).

  Normal S3 write latency: < 500ms
  Warning threshold: > 2000ms
  Critical threshold: > 5000ms (THIS ALERT)

  High S3 latency causes:
  - S3Write queue buildup
  - Ingest queue backup
  - Eventually triggers backpressure
  - Can lead to data loss if sustained

  Investigation:
  1. Check AWS S3 service status
  2. Review network latency to S3 endpoint
  3. Check for S3 throttling
  4. Monitor s3write_channel_depth
  5. Prepare for potential backpressure

# Type of alert: BASELINE | STATIC
type: STATIC

# NRQL query
nrql:
  query: "SELECT percentile(otelcol_icebergexporter_write_latency_ms, 99) FROM Metric WHERE namespace = 'pcg-backpressure-processor'"

# Function used to aggregate the NRQL query value(s) for comparison to the terms.threshold (Default: SINGLE_VALUE)
valueFunction: SINGLE_VALUE

# List of Critical and Warning thresholds for the condition
terms:
  - priority: WARNING
    # Operator used to compare against the threshold.
    operator: ABOVE
    # Value that triggers a violation (5000ms = 5 seconds)
    threshold: 5000
    # Time in seconds; 120 - 3600 (3 minutes)
    thresholdDuration: 180
    # How many data points must be in violation for the duration
    thresholdOccurrences: ALL

# Duration after which a violation automatically closes
# Time in seconds; 300 - 2592000 (Default: 86400 [1 day])
violationTimeLimitSeconds: 259200
