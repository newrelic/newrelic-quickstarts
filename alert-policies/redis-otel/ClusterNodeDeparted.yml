name: Redis Cluster node departed

# Description and details
description: |
  This alert is triggered when the number of known nodes in the cluster drops, indicating a node has departed or become unreachable. This reduces cluster capacity and fault tolerance — if the departed node was a master with no replica, data in its slots becomes unavailable.

# Type of alert: BASELINE | STATIC
type: BASELINE

# Function used to aggregate the NRQL query value(s) for comparison to the terms.threshold (Default: SINGLE_VALUE)
valueFunction: SINGLE_VALUE

# NRQL query
nrql:
  query: "FROM Metric SELECT latest(redis.cluster.known_nodes) WHERE metricName = 'redis.cluster.known_nodes' FACET entity.name"

# Direction in which baseline is set (Default: LOWER_ONLY)
baselineDirection: LOWER_ONLY

# List of Critical and Warning thresholds for the condition
terms:
  - priority: CRITICAL
    # Operator used to compare against the threshold.
    operator: ABOVE
    # Value that triggers a violation (number of standard deviations)
    threshold: 3
    # Time in seconds; 120 - 3600, must be a multiple of 60 for Baseline conditions
    thresholdDuration: 300
    # How many data points must be in violation for the duration
    thresholdOccurrences: ALL
  - priority: WARNING
    # Operator used to compare against the threshold.
    operator: ABOVE
    # Value that triggers a violation (number of standard deviations)
    threshold: 2
    # Time in seconds; 120 - 3600, must be a multiple of 60 for Baseline conditions
    thresholdDuration: 300
    # How many data points must be in violation for the duration
    thresholdOccurrences: ALL

# Duration after which a violation automatically closes
# Time in seconds; 300 - 2592000 (Default: 86400 [1 day])
violationTimeLimitSeconds: 86400
