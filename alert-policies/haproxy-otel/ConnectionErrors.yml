name: HAProxy connection errors are abnormally high

# Description and details
description: |
  This alert is triggered when HAProxy connection errors deviate significantly from normal levels. Connection errors indicate that HAProxy is unable to establish connections to backend servers — this typically means backends are down, overloaded, or unreachable.

# Type of alert: BASELINE | STATIC
type: BASELINE

# Function used to aggregate the NRQL query value(s) for comparison to the terms.threshold (Default: SINGLE_VALUE)
valueFunction: SINGLE_VALUE

# NRQL query
nrql:
  query: "FROM Metric SELECT sum(haproxy.connections.errors) WHERE instrumentation.provider = 'opentelemetry'"

# Direction of the baseline comparison (UPPER_ONLY | LOWER_ONLY | UPPER_AND_LOWER)
baselineDirection: UPPER_ONLY

# List of Critical and Warning thresholds for the condition
terms:
  - priority: CRITICAL
    # Operator used to compare against the threshold.
    operator: ABOVE
    # Value that triggers a violation; for BASELINE this is the number of standard deviations
    threshold: 4
    # Time in seconds; 120 - 3600, must be a multiple of 60 for Baseline conditions
    thresholdDuration: 300
    # How many data points must be in violation for the duration
    thresholdOccurrences: ALL
  - priority: WARNING
    operator: ABOVE
    threshold: 3
    thresholdDuration: 300
    thresholdOccurrences: ALL

# Duration after which a violation automatically closes
# Time in seconds; 300 - 2592000 (Default: 86400 [1 day])
violationTimeLimitSeconds: 86400
