id: haproxy-opentelemetry
displayName: HAProxy (OpenTelemetry Collector)
description: |
  Monitor HAProxy load balancers using OpenTelemetry Collector. Collect comprehensive metrics from sessions, requests, connections, errors, and backend server health via the haproxyreceiver.
install:
  primary:
    nerdlet:
      nerdletId: marketplace.install-data-source
      nerdletState:
        dataSourceId: haproxy-opentelemetry
        frameworkConfigId: haproxy-otel
      requiresAccount: false
icon: logo.png

keywords:
  - infrastructure
  - open source
  - open-source
  - open telemetry
  - otel haproxy
  - opentelemetry haproxy
  - load balancer
  - proxy

categoryTerms:
  - open source monitoring
  - infrastructure
