id: metricshub
displayName: MetricsHub
description: |
  This integration connects the MetricsHub agent's native OpenTelemetry pipeline to your New Relic account over OTLP. MetricsHub remotely monitors the hardware health of your servers, storage systems, and network switches, as well as the performance and status of your operating systems and databases. You don't need to deploy an agent on the monitored systems.
